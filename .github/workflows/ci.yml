name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      # Hard gates — must pass to merge.
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test:coverage

      # Hard gate — lint errors (and a crashing linter) fail CI now that the
      # backlog is cleared. Warnings stay advisory: `eslint` exits 0 on
      # warnings; add --max-warnings 0 later to gate those too.
      - name: Lint
        run: npx eslint src/

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

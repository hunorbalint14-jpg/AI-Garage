version: 2
updates:
  # npm dependencies. Security updates are raised immediately by Dependabot
  # regardless of this schedule; the weekly run handles routine version bumps.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Collapse routine minor/patch bumps into one PR to cut review noise.
      # Major bumps stay separate so breaking changes get individual scrutiny.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Pinned exactly today; let Dependabot widen as needed but flag majors.
    labels:
      - "dependencies"
    ignore:
      # Keep @types/node aligned to the Node runtime (currently Node 20). Skip
      # major bumps; minor/patch within the current major still flow.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # ESLint 10 crashes eslint-config-next@16's bundled eslint-plugin-react
      # (removed context.getFilename()). Stay on eslint 9 until next/eslint-config
      # ships an eslint-10-compatible release. Skip major bumps.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions (CI workflow) pinned to current versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"

<!-- AIGarage brand <head> snippet -->
<!-- Drop in <head>; adjust the path prefix if you don't serve from /brand. -->

<!-- Modern adaptive SVG favicon (dark / light auto-switches) -->
<link rel="icon" type="image/svg+xml" href="/brand/icon/aigarage-favicon.svg" />

<!-- Multi-resolution ICO fallback for legacy browsers -->
<link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/brand/icon/favicon.ico" />

<!-- PNG favicon fallbacks (Chrome, Firefox older versions) -->
<link rel="icon" type="image/png" sizes="32x32"  href="/brand/icon/png/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/brand/icon/png/favicon-192.png" />

<!-- iOS / iPadOS — home-screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/brand/icon/png/apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="167x167" href="/brand/icon/png/apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="/brand/icon/png/apple-touch-icon-152.png" />

<!-- Android / PWA — manifest -->
<link rel="manifest" href="/brand/icon/site.webmanifest" />

<!-- Tab theme color matches brand green; meta theme-color tints mobile UI chrome -->
<meta name="theme-color" content="#0b0d11" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#22c55e" media="(prefers-color-scheme: light)" />

<!-- Microsoft tile -->
<meta name="msapplication-TileColor" content="#22c55e" />
<meta name="msapplication-TileImage" content="/brand/icon/png/favicon-192.png" />

<!-- Open Graph / social — uses the square brand tile (1200×630-safe variant) -->
<meta property="og:image" content="/brand/icon/png/apple-app-store-1024.png" />
<meta name="twitter:image" content="/brand/icon/png/apple-app-store-1024.png" />
<meta name="twitter:card" content="summary" />
